name: Build and Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        
    - name: Install dependencies
      run: |
        # Clean install with retry logic
        npm ci --no-audit --no-fund || {
          echo "First npm ci failed, cleaning and retrying..."
          rm -rf node_modules package-lock.json
          npm install --package-lock-only
          npm ci --no-audit --no-fund
        }

    - name: Verify installation
      run: |
        echo "Node version: $(node --version)"
        echo "NPM version: $(npm --version)"
        echo "Checking package.json..."
        cat package.json
        echo "Checking if node_modules exists..."
        ls -la node_modules/ | head -10

    - name: Build application
      run: |
        echo "Starting build process..."
        npm run build || {
          echo "Build failed, checking for common issues..."
          echo "Disk space:"
          df -h
          echo "Memory usage:"
          free -h
          echo "Node processes:"
          ps aux | grep node
          exit 1
        }
        echo "Build completed successfully!"
        ls -la dist/
      env:
        NODE_OPTIONS: --max-old-space-size=4096
        CI: true
        
    - name: Deploy to Vercel (Production)
      if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && secrets.VERCEL_TOKEN
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-args: '--prod'
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        
    - name: Deploy to Vercel (Preview)
      if: (github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master') && secrets.VERCEL_TOKEN
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-args: '--no-wait'
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        
    - name: Build completed successfully
      if: ${{ !secrets.VERCEL_TOKEN }}
      run: |
        echo "✅ Build completed successfully!"
        echo "ℹ️  Vercel deployment skipped (VERCEL_TOKEN not configured)"
        echo "📦 Built files are available in the 'dist' directory"
        
    - name: Comment PR with deployment URL
      if: github.event_name == 'pull_request' && secrets.VERCEL_TOKEN
      uses: actions/github-script@v7
      with:
        script: |
          const { data: deployments } = await github.rest.repos.listDeployments({
            owner: context.repo.owner,
            repo: context.repo.repo
          });
          const latestDeployment = deployments[0];
          if (latestDeployment) {
            const deploymentUrl = `https://${latestDeployment.environment}.vercel.app`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Preview Deployment Ready!**
              \n\n📱 **URL:** ${deploymentUrl}
              \n\nThis preview will be automatically updated when you push new commits to this PR.`
            });
          }
          
    - name: Comment PR with build status
      if: github.event_name == 'pull_request' && ${{ !secrets.VERCEL_TOKEN }}
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `✅ **Build Completed Successfully!**
            \n\n📦 The application has been built and is ready for deployment.
            \n\nℹ️ Vercel deployment is not configured. To enable automatic deployments, add the following secrets to your repository:
            \n- \`VERCEL_TOKEN\`
            \n- \`VERCEL_ORG_ID\`
            \n- \`VERCEL_PROJECT_ID\``
          });
